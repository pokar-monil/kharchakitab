<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KharchaKitab has moved!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --kk-paper: #faf8f5;
      --kk-cream: #f5f2ed;
      --kk-ink: #1a1a1a;
      --kk-ash: #6b6b6b;
      --kk-smoke: rgba(15, 15, 15, 0.06);
      --kk-smoke-heavy: rgba(15, 15, 15, 0.12);
      --kk-ember: #ff6b35;
      --kk-ember-deep: #e04a16;
      --kk-ember-glow: #ff8c5a;
      --kk-saffron: #f7c948;
      --kk-sage: #2d8d60;
      --kk-sage-bg: rgba(45, 141, 96, 0.08);
      --kk-sage-ink: #1e5e40;
      --kk-danger: #e5484d;
      --kk-danger-bg: rgba(229, 72, 77, 0.08);
      --kk-danger-ink: #b02a30;
      --kk-shadow-sm: 0 2px 8px rgba(10, 10, 10, 0.04);
      --kk-shadow-md: 0 8px 24px rgba(10, 10, 10, 0.08);
      --kk-shadow-ember: 0 8px 32px rgba(255, 107, 53, 0.25);
      --kk-ease-out: cubic-bezier(0.4, 0, 0.2, 1);
      --kk-ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes orb-ember {
      0%, 100% { transform: scale(1);   opacity: 0.35; }
      50%       { transform: scale(1.1); opacity: 0.45; }
    }

    @keyframes orb-saffron {
      0%, 100% { transform: scale(1);    opacity: 0.25; }
      50%       { transform: scale(1.15); opacity: 0.35; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--kk-paper);
      color: var(--kk-ink);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      overflow: hidden;
    }

    /* Background orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
      z-index: 0;
    }

    .orb-ember {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--kk-ember) 0%, var(--kk-saffron) 60%, transparent 70%);
      top: -120px;
      right: -120px;
      animation: orb-ember 8s infinite ease-in-out;
    }

    .orb-saffron {
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, var(--kk-saffron) 0%, var(--kk-ember-glow) 50%, transparent 70%);
      bottom: -80px;
      left: -80px;
      animation: orb-saffron 10s infinite ease-in-out 2s;
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--kk-smoke-heavy);
      border-radius: 24px;
      padding: 40px 36px 36px;
      box-shadow: var(--kk-shadow-md);
      text-align: center;
      animation: fade-up 0.4s var(--kk-ease-out) both;
    }

    /* Icon badge */
    .icon-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--kk-ember) 0%, var(--kk-ember-deep) 100%);
      border-radius: 16px;
      margin-bottom: 24px;
      box-shadow: var(--kk-shadow-ember);
      animation: fade-up 0.4s var(--kk-ease-out) 0.05s both;
    }

    .icon-badge svg {
      width: 28px;
      height: 28px;
      color: white;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Heading */
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.625rem;
      font-weight: 700;
      color: var(--kk-ink);
      line-height: 1.25;
      margin-bottom: 10px;
      animation: fade-up 0.4s var(--kk-ease-out) 0.1s both;
    }

    /* Domain pill */
    .domain-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--kk-cream);
      border: 1px solid var(--kk-smoke-heavy);
      border-radius: 999px;
      padding: 4px 12px 4px 8px;
      margin-bottom: 20px;
      animation: fade-up 0.4s var(--kk-ease-out) 0.15s both;
    }

    .domain-pill-dot {
      width: 7px;
      height: 7px;
      background: var(--kk-sage);
      border-radius: 50%;
    }

    .domain-pill span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--kk-sage-ink);
      letter-spacing: 0.02em;
    }

    /* Body text */
    p {
      font-size: 0.9375rem;
      color: var(--kk-ash);
      line-height: 1.6;
      margin-bottom: 28px;
      animation: fade-up 0.4s var(--kk-ease-out) 0.2s both;
    }

    /* Button */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: linear-gradient(135deg, var(--kk-ember) 0%, var(--kk-ember-deep) 100%);
      color: white;
      border: none;
      padding: 0.9375rem 1.5rem;
      border-radius: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--kk-shadow-ember);
      transition: transform 250ms var(--kk-ease-out), opacity 150ms var(--kk-ease-out);
      will-change: transform, opacity;
      animation: fade-up 0.4s var(--kk-ease-out) 0.25s both;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
    }

    .btn:active:not(:disabled) {
      transform: translateY(0) scale(0.98);
    }

    .btn:focus-visible {
      outline: none;
      box-shadow: var(--kk-shadow-ember), 0 0 0 3px rgba(255, 107, 53, 0.3);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .btn-arrow {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .btn-spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.35);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    /* Status */
    .status {
      margin-top: 16px;
      min-height: 20px;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--kk-ash);
      line-height: 1.4;
      animation: fade-up 0.4s var(--kk-ease-out) 0.3s both;
    }

    .status.error {
      color: var(--kk-danger-ink);
      background: var(--kk-danger-bg);
      border-radius: 10px;
      padding: 8px 12px;
    }

    .status.success {
      color: var(--kk-sage-ink);
      background: var(--kk-sage-bg);
      border-radius: 10px;
      padding: 8px 12px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>

<body>
  <div class="orb orb-ember"></div>
  <div class="orb orb-saffron"></div>

  <div class="card">
    <div class="icon-badge">
      <svg viewBox="0 0 24 24">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </div>

    <h1>We've got a new home</h1>

    <div class="domain-pill">
      <div class="domain-pill-dot"></div>
      <span>kharchakitab.com</span>
    </div>

    <p>Your data stays with you — click below to carry everything over to the new site instantly.</p>

    <button class="btn" id="btn" onclick="doExport()">
      <svg class="btn-arrow" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      Move my data
    </button>

    <div class="status" id="status"></div>
  </div>

  <script>
    var DB_NAME = "QuickLogDB";
    var STORES = [
      "transactions", "transaction_versions", "device_identity",
      "pairings", "sync_state", "recurring_templates", "recurring_alerts"
    ];
    var LS_KEYS = [
      "kk-currency", "kk_budgets", "kk_budgets_household", "kk_mannKiBaat",
      "kk_seen_tips", "kk_install_dismissed", "kk_streak_count", "kk_streak_last_date",
      "kk_summary_view", "kk_notifications_master", "kk_sound_enabled",
      "kk_alerts_last_sync_at", "kk_alerts_queue_hash"
    ];

    function setStatus(msg, type) {
      var el = document.getElementById("status");
      el.textContent = msg;
      el.className = "status" + (type ? " " + type : "");
    }

    function setBtn(text, showSpinner) {
      var btn = document.getElementById("btn");
      if (showSpinner) {
        btn.innerHTML = '<div class="btn-spinner"></div>' + text;
      } else {
        btn.innerHTML = '<svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>' + text;
      }
    }

    async function doExport() {
      var btn = document.getElementById("btn");
      btn.disabled = true;
      setBtn("Collecting data...", true);
      setStatus("Reading your data...");

      try {
        var result = { localStorage: {}, indexedDB: {} };

        // 1. Gather localStorage
        for (var i = 0; i < LS_KEYS.length; i++) {
          var val = localStorage.getItem(LS_KEYS[i]);
          if (val !== null) result.localStorage[LS_KEYS[i]] = val;
        }

        // 2. Gather IndexedDB
        try {
          var db = await new Promise(function (resolve, reject) {
            var req = indexedDB.open(DB_NAME);
            req.onsuccess = function () { resolve(req.result); };
            req.onerror = function () { reject(req.error); };
            req.onupgradeneeded = function () {
              req.transaction.abort();
              reject(new Error("no-db"));
            };
          });

          for (var s = 0; s < STORES.length; s++) {
            var store = STORES[s];
            if (!db.objectStoreNames.contains(store)) continue;
            var tx = db.transaction(store, "readonly");
            var all = await new Promise(function (resolve, reject) {
              var r = tx.objectStore(store).getAll();
              r.onsuccess = function () { resolve(r.result); };
              r.onerror = function () { reject(r.error); };
            });
            if (all.length > 0) result.indexedDB[store] = all;
          }
          db.close();
        } catch (e) {
          // No IndexedDB — fine
        }

        var lsCount = Object.keys(result.localStorage).length;
        var idbCount = Object.keys(result.indexedDB).reduce(function (sum, k) { return sum + result.indexedDB[k].length; }, 0);

        if (lsCount === 0 && idbCount === 0) {
          setStatus("No data found to migrate.", "error");
          setBtn("No data to move", false);
          return;
        }

        setStatus("Found " + idbCount + " records. Redirecting...", "success");

        // Compress and encode
        var json = JSON.stringify(result);
        var compressed = btoa(encodeURIComponent(json));

        // Use hash fragment — not sent to server, no URI length limit
        window.location.href = "https://kharchakitab.com/#migrate=" + compressed;
      } catch (err) {
        setStatus("Error: " + err.message, "error");
        btn.disabled = false;
        setBtn("Try again", false);
      }
    }
  </script>
</body>

</html>
